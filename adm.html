<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Fabrica dos Cortes</title>
 
    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
 
    <!-- Font Awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
 
    <!-- Estilos -->
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="assets/styles-adm/styles.css">
</head>
<body>
 
    <!---->
    <header>
        <nav id="navbar">
            <img src="assets/img/logo_fabrica.png" alt="Logo Fabrica De Cortes" id="logo">
 
            <ul id="nav_list">
                <li class="nav-item">
                    <a href="#admin_section">AGENDAMENTOS</a>
                </li>
            </ul>
 
            <div id="buttons">
                <button class="btn-default" id="btn_novo">
                    <i class="fa-solid fa-plus"></i>
                    NOVO AGENDAMENTO
                </button>
            </div>
        </nav>
    </header>
 
    <!--===== -->
    <main id="content">
        <section id="admin_section">
 
            <!-- CARDS DE RESUMO -->
            <div id="stats">
                <div class="stat-card">
                    <p class="stat-label">HOJE</p>
                    <h2 class="stat-value" id="stat-total">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">CONFIRMADOS</p>
                    <h2 class="stat-value" id="stat-confirmados">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">PENDENTES</p>
                    <h2 class="stat-value" id="stat-pendentes">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">CANCELADOS</p>
                    <h2 class="stat-value" id="stat-cancelados">0</h2>
                </div>
            </div>
 
            <!---->
            <div id="filtros">
                <div class="filtro-group">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="busca" placeholder="Buscar cliente...">
                </div>
 
                <select id="filtro-barbeiro" class="select-default">
                    <option value="">Todos os barbeiros</option>
                    <option value="David">David</option>
                    <option value="Kelvin">Kelvin</option>
                </select>
 
                <select id="filtro-status" class="select-default">
                    <option value="">Todos os status</option>
                    <option value="confirmado">Confirmado</option>
                    <option value="pendente">Pendente</option>
                    <option value="cancelado">Cancelado</option>
                    <option value="aguardando">Aguardando</option>
                </select>
            </div>
 
            <!-- TABELA -->
            <div id="tabela_wrap">
                <table id="tabela">
                    <thead>
                        <tr>
                            <th>CLIENTE</th>
                            <th>SERVIÇO</th>
                            <th>BARBEIRO</th>
                            <th>DATA</th>
                            <th>HORÁRIO</th>
                            <th>STATUS</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela_body">
                        <!-- Linhas inseridas pelo script.js -->
                    </tbody>
                </table>
 
                <!---->
                <div id="tabela_vazia" style="display: none;">
                    <i class="fa-regular fa-calendar-xmark"></i>
                    <p>Nenhum agendamento encontrado.</p>
                </div>
            </div>
 
        </section>
    </main>
 
    <!---->
    <div id="modal_overlay" class="modal-overlay" style="display: none;">
        <div class="modal">
 
            <div class="modal-header">
                <h2 class="modal-title" id="modal_titulo">NOVO AGENDAMENTO</h2>
                <button class="modal-fechar" id="modal_fechar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
 
            <div class="modal-body">
                <!-- ID oculto para edição -->
                <input type="hidden" id="campo_id">
 
                <div class="campo-group">
                    <label for="campo_cliente">CLIENTE</label>
                    <input type="text" id="campo_cliente" placeholder="Nome do cliente" class="input-default">
                </div>
 
                <div class="campo-row">
                    <div class="campo-group">
                        <label for="campo_servico">SERVIÇO</label>
                        <select id="campo_servico" class="select-default">
                            <option value="">Selecione...</option>
                            <option value="Corte + Barba">Corte + Barba</option>
                            <option value="Corte Gilete">Corte Gilete</option>
                            <option value="Barba e Bigode">Barba e Bigode</option>
                            <option value="Penteado">Penteado</option>
                            <option value="Químico">Químico</option>
                        </select>
                    </div>
 
                    <div class="campo-group">
                        <label for="campo_barbeiro">BARBEIRO</label>
                        <select id="campo_barbeiro" class="select-default">
                            <option value="">Selecione...</option>
                            <option value="David">David</option>
                            <option value="Kelvin">Kelvin</option>
                        </select>
                    </div>
                </div>
 
                <div class="campo-row">
                    <div class="campo-group">
                        <label for="campo_data">DATA</label>
                        <input type="date" id="campo_data" class="input-default">
                    </div>
 
                    <div class="campo-group">
                        <label for="campo_horario">HORÁRIO</label>
                        <input type="time" id="campo_horario" class="input-default">
                    </div>
                </div>
 
                <div class="campo-group">
                    <label for="campo_status">STATUS</label>
                    <select id="campo_status" class="select-default">
                        <option value="aguardando">Aguardando</option>
                        <option value="confirmado">Confirmado</option>
                        <option value="pendente">Pendente</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
            </div>
 
            <div class="modal-footer">
                <button class="btn-default btn-cancelar" id="modal_cancelar">CANCELAR</button>
                <button class="btn-default btn-salvar" id="modal_salvar">
                    <i class="fa-solid fa-check"></i>
                    SALVAR
                </button>
            </div>
        </div>
    </div>
 
    <!---->
    <div id="modal_del_overlay" class="modal-overlay" style="display: none;">
        <div class="modal modal-sm">
 
            <div class="modal-header">
                <h2 class="modal-title">EXCLUIR AGENDAMENTO</h2>
                <button class="modal-fechar" id="modal_del_fechar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
 
            <div class="modal-body">
                <p class="modal-texto">
                    Tem certeza que deseja excluir o agendamento de <strong id="del_nome"></strong>?<br>
                    Esta ação não pode ser desfeita.
                </p>
            </div>
 
            <div class="modal-footer">
                <button class="btn-default btn-cancelar" id="modal_del_cancelar">CANCELAR</button>
                <button class="btn-default btn-deletar" id="modal_del_confirmar">
                    <i class="fa-solid fa-trash"></i>
                    EXCLUIR
                </button>
            </div>
        </div>
    </div>
 
    <!--===== -->
    <div id="toast"></div>
</body>
</html>
